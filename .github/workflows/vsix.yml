name: VSIX build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write # This is required for the federated credential to work

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7
  
    - name: Update Version
      run: |
        ((Get-Content -Path tools/SqlAnalyzerVsix/SqlAnalyzerVsix.csproj -Raw) -Replace "0.0.0.0", "${{ env.VERSION }}") | Set-Content -Path tools/SqlAnalyzerVsix/SqlAnalyzerVsix.csproj
        ((Get-Content -Path tools/SqlAnalyzerSsms/source.extension.vsixmanifest -Raw) -Replace "1.0.0", "${{ env.VERSION }}") | Set-Content -Path tools/SqlAnalyzerSsms/source.extension.vsixmanifest

      shell: pwsh

    - name: Restore
      run: dotnet restore SqlServer.Rules.slnx

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v3

    - name: Build
      run: msbuild SqlServer.Rules.slnx /property:Configuration=Release /p:DeployExtension=false /p:ZipPackageCompressionLevel=normal /v:m

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build VS Code extension
      working-directory: vscode-extension
      run: |
        npm ci
        ((Get-Content -Path package.json -Raw) -Replace '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+"', '"version": "${{ env.VERSION }}"') | Set-Content -Path package.json
        npm run package
      shell: pwsh

    - name: Move build output
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' ||  github.event_name == 'workflow_dispatch')
      run: |
        mv tools/SqlAnalyzerVsix/bin/Release/net8.0-windows8.0/SqlAnalyzerVsix.vsix SqlAnalyzerVsix-${{ env.VERSION }}.vsix
        mv tools/SqlAnalyzerSsms/bin/Release/net48/SqlAnalyzerSsms.vsix SqlAnalyzerSsms-${{ env.VERSION }}.vsix
        mv vscode-extension/tsqlanalyzer.vsix TSQLAnalyzerVSCode-${{ env.VERSION }}.vsix

    - name: Azure CLI login with federated credential
      if: github.event_name != 'pull_request'
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Install dotnet sign
      if: github.event_name != 'pull_request'
      run: dotnet tool install --global sign --prerelease

    - name: Sign VSIX packages
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' ||  github.event_name == 'workflow_dispatch')
      run: sign code trusted-signing *.vsix `
        --trusted-signing-account ErikEJ `
        --trusted-signing-certificate-profile ErikEJCert `
        --trusted-signing-endpoint https://weu.codesigning.azure.net `
        -fl fileslist.txt `
        --verbosity information

    - name: Publish artifacts
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' ||  github.event_name == 'workflow_dispatch')
      uses: actions/upload-artifact@v7
      with:
        name: Artifacts
        path: |
          *.vsix

    - name: Publish SqlAnalyzerVsix to Open VSIX Gallery
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' ||  github.event_name == 'workflow_dispatch')
      uses: madskristensen/publish-vsixgallery@v1
      with:
        vsix-file: SqlAnalyzerVsix-${{ env.VERSION }}.vsix

    - name: Publish SqlAnalyzerSsms to Open VSIX Gallery
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' ||  github.event_name == 'workflow_dispatch')
      uses: madskristensen/publish-vsixgallery@v1
      with:
        vsix-file: SqlAnalyzerSsms-${{ env.VERSION }}.vsix

    - name: Publish SqlAnalyzerSsms to SSMS Gallery
      if: github.ref == 'refs/heads/master' && github.repository_owner == 'erikej' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: madskristensen/publish-vsixgallery@v1
      with:
        vsix-file: SqlAnalyzerSsms-${{ env.VERSION }}.vsix
        gallery-url: https://ssmsgallery.azurewebsites.net
